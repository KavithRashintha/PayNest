version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: paynest-postgres
    environment:
      POSTGRES_DB: paynest_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paynest_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: paynest-user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/paynest_db?currentSchema=user_schema
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  finance-service:
    build:
      context: ./finance-service
      dockerfile: Dockerfile
    container_name: paynest-finance-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/paynest_db?currentSchema=finance_schema
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: paynest-ai-service
    ports:
      - "8090:8090"
    environment:
      FINANCE_SERVICE_URL: http://finance-service:8082
      USER_SERVICE_URL: http://user-service:8081
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - finance-service

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: paynest-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8081
      FINANCE_SERVICE_URL: http://finance-service:8082
      AI_SERVICE_URL: http://ai-service:8090
    depends_on:
      - user-service
      - finance-service
      - ai-service

volumes:
  postgres_data:
